<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Name Folder</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            height: 100vh;
            position: relative;
        }

        .title {
            text-align: center;
            font-size: 32px;
            margin-top: 100px;
            margin-bottom: 40px;
        }

        .input-box {
            display: block;
            margin: 0 auto;
            padding: 20px;
            font-size: 22px;
            border: 3px solid black;
            width: 300px;
            text-align: center;
        }

        .btn {
            position: fixed;
            bottom: 20px;
            padding: 10px 20px;
            font-size: 20px;
            border: 2px solid black;
            background-color: white;
            cursor: pointer;
        }

        .back {
            left: 20px;
        }

        .submit {
            right: 20px;
        }

        .btn:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <div class="title">Name Folder</div>

    <input
        type="text"
        class="input-box"
        id="folderName"
        placeholder="enter name here"
    >

    <button class="btn back" onclick="goBack()">Back</button>
    <button class="btn submit" onclick="submitFolder()">Submit</button>

    <script>
        function goBack() {
            window.location.href = "create_flashcards.html";
        }

        function submitFolder() {
            let name = document.getElementById("folderName").value.trim();

            if (name === "") {
                alert("Please enter a folder name");
                return;
            }

            // Get existing folders
            let folders = JSON.parse(localStorage.getItem("folders")) || [];

            // Add new folder
            folders.push(name);

            // Save to localStorage
            localStorage.setItem("folders", JSON.stringify(folders));

            alert("Folder created: " + name);

            window.location.href = "../create_flashcards.html";
        }
    </script>

</body>
</html>
