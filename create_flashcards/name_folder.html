<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Flashcards</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            height: 100vh;
        }

        .title {
            text-align: center;
            font-size: 32px;
            margin-top: 80px;
        }

        .box {
            width: 70%;
            height: 200px;
            border: 6px solid black;
            margin: 40px auto;
            position: relative;
            display: flex;
            align-items: flex-start;
        }

        .plus {
            font-size: 60px;
            margin: 20px;
            cursor: pointer;
        }

        .folder {
            border: 2px solid black;
            padding: 10px;
            margin: 10px;
            background-color: white;
            cursor: pointer;
        }

        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            padding: 10px 20px;
            font-size: 18px;
            border: 2px solid black;
            background-color: white;
            cursor: pointer;
        }

        .submit-btn:hover {
            background-color: #ddd;
        }
    </style>
</head>
<body>

    <div class="title">Choose Folder</div>

    <div class="box" id="folderBox">
        <div class="plus" onclick="addFolder()">+</div>
    </div>

    <button class="back-btn" onclick="goBack()">Back</button>

    <script>
        function goBack() {
            window.location.href = "main_menu.html";
        }

        let folderCount = 0;

        function addFolder() {
            let folders = JSON.parse(localStorage.getItem("folders")) || [];

            if (folders.length >= 10) {
                alert("You can only have 10 folders!");
                return;
            }

            // Open Name Folder page
            window.location.href = "create_flashcards/name_folder.html";
        }

        function loadFolders() {
            let folders = JSON.parse(localStorage.getItem("folders")) || [];
            let box = document.getElementById("folderBox");

            // Keep "+"
            box.innerHTML = '<div class="plus" onclick="addFolder()">+</div>';

            folders.forEach((name, index) => {
                let container = document.createElement("div");
                container.style.display = "flex";
                container.style.alignItems = "center";
                container.style.marginBottom = "10px";

                // Folder button
                let btn = document.createElement("button");
                btn.className = "folder";
                btn.innerHTML = name;
                btn.onclick = () => {
                    localStorage.setItem("currentFolder", name);
                    window.location.href = "create_flashcards/user_inputs.html";
                };

                // Delete button
                let del = document.createElement("button");
                del.innerHTML = "🗑";
                del.style.marginLeft = "10px";
                del.style.cursor = "pointer";
                del.onclick = (e) => {
                    e.stopPropagation(); // prevent opening folder
                    folders.splice(index, 1); // remove from array
                    localStorage.setItem("folders", JSON.stringify(folders));

                    // Also remove folder notes
                    localStorage.removeItem(name);

                    loadFolders(); // reload display
                };

                container.appendChild(btn);
                container.appendChild(del);
                box.appendChild(container);
            });
        }

        // Run when page loads
        window.onload = loadFolders;
    </script>

</body>
</html>
